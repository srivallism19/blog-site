<nav class="navbar">
    <div class="nav-left">
        <a routerLink="/" class="brand">BlogSite</a>
    </div>
    <div class="nav-right">
        <ng-container *ngIf="!(authService.isLoggedIn$ | async); else loggedInBlock">
            <button class="nav-login-btn" (click)="goToLogin()">Login</button>
            <button class="nav-register-btn" (click)="goToRegister()">Register</button>
        </ng-container>

        <ng-template #loggedInBlock>
            <button class="nav-blogs-btn" (click)="goToBlog()">My Blogs</button>
            <button class="nav-all-blogs-btn" (click)="goToAllBlogs()">All Blogs</button>
            <button class="nav-logout-btn" (click)="logOut()">Logout</button>
        </ng-template>
    </div>


</nav>
